<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asset Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f0ee; font-family: 'SF Mono', monospace; padding: 60px 40px; }
    h2 { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #999; margin-bottom: 20px; }
    .section { margin-bottom: 60px; }

    .favicon-row { display: flex; align-items: flex-end; gap: 24px; }
    .favicon-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .favicon-item span { font-size: 10px; color: #aaa; letter-spacing: 0.08em; }
    .favicon-item img { display: block; }

    .card-wrap { border: 1px solid #ddd; border-radius: 6px; overflow: hidden; width: 100%; max-width: 600px; }
    .card-wrap img { width: 100%; display: block; }
  </style>
</head>
<body>

  <div class="section">
    <h2>Favicon</h2>
    <div class="favicon-row">
      <div class="favicon-item">
        <img src="/assets/favicon.svg" width="16" height="16" />
        <span>16px</span>
      </div>
      <div class="favicon-item">
        <img src="/assets/favicon.svg" width="32" height="32" />
        <span>32px</span>
      </div>
      <div class="favicon-item">
        <img src="/assets/favicon.svg" width="64" height="64" />
        <span>64px</span>
      </div>
      <div class="favicon-item">
        <img src="/assets/favicon.svg" width="128" height="128" />
        <span>128px</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Social Card (1200 × 630)</h2>
    <div class="card-wrap">
      <img src="/assets/card.svg" />
    </div>
  </div>

</body>
</html>
