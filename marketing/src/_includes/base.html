<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <title>{{ title }}</title>
  {% if noindex %}<meta name="robots" content="noindex" />{% endif %}
  {% if description %}<meta name="description" content="{{ description }}" />{% endif %}
  {% if og %}
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://thedataroom.app/" />
  <meta property="og:title" content="{{ title }}" />
  <meta property="og:description" content="{{ description }}" />
  <meta property="og:image" content="https://thedataroom.app/assets/card.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ title }}" />
  <meta name="twitter:description" content="{{ description }}" />
  <meta name="twitter:image" content="https://thedataroom.app/assets/card.png" />
  <link rel="canonical" href="https://thedataroom.app/" />
  {% endif %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #211e1e;
      --dim: #656363;
      --accent: #211e1e;
      --rule: #e4e4e0;
      --surface: #f8f7f7;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1a1a;
        --text: #e6e0dc;
        --dim: #8a8585;
        --accent: #f1ecec;
        --rule: #4b4646;
        --surface: #2a2626;
      }
    }

    html, body { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: underline; text-decoration-color: var(--dim); text-underline-offset: 3px; }
    a:hover { text-decoration-color: var(--text); }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 72px 40px 180px;
    }

    header {
      margin-bottom: 72px;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 16px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }

    .tagline {
      margin-top: 12px;
      font-size: 16px;
      color: var(--dim);
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }

    section { margin-bottom: 72px; }

    h1 { font-size: 32px; font-weight: 400; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }

    h2 {
      font-size: 13px;
      font-family: var(--mono);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 20px;
    }

    p {
      font-size: 19px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    p:last-child { margin-bottom: 0; }

    .lede {
      font-size: 26px;
      line-height: 1.45;
      color: var(--accent);
      margin-bottom: 22px;
    }

    .updated {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--dim);
      letter-spacing: 0.08em;
      margin-bottom: 56px;
    }

    /* diagram */
    .diagram {
      margin: 48px 0;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 40px 36px;
      font-family: var(--mono);
      font-size: 15px;
      color: var(--dim);
      overflow-x: auto;
    }

    .diagram-title {
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 24px;
      color: var(--dim);
    }

    .diagram-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      white-space: nowrap;
    }

    .box {
      border: 1px solid var(--rule);
      padding: 10px 18px;
      border-radius: 3px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .box.you { border-color: var(--accent); color: var(--accent); }

    .action {
      display: inline-block;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 3px 10px;
      margin-left: 8px;
      font-size: 13px;
      color: var(--dim);
      letter-spacing: 0.04em;
      background: var(--bg);
    }
    .action.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* feature list */
    .feature-list { list-style: none; padding: 0; }

    .feature-list li {
      font-size: 18px;
      color: var(--text);
      padding: 16px 0;
      border-bottom: 1px solid var(--rule);
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .feature-list li:first-child { border-top: 1px solid var(--rule); }

    .feat-label {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 30px;
      color: var(--dim);
      letter-spacing: 0.08em;
      min-width: 140px;
      flex-shrink: 0;
    }

    .cta-block {
      margin-top: 80px;
      padding: 40px 0;
      border-top: 1px solid var(--rule);
    }

    .cta-block p { font-size: 16px; color: var(--dim); }

    .cta-email {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--dim);
      padding-bottom: 1px;
      transition: border-color 0.15s;
    }

    .cta-email:hover { border-color: var(--accent); }

    footer {
      margin-top: 120px;
      padding-top: 36px;
      border-top: 1px solid var(--rule);
      font-family: var(--mono);
      font-size: 14px;
      color: var(--dim);
      letter-spacing: 0.06em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-right { display: inline-flex; align-items: center; }
    .footer-right > * + * { margin-left: 22px; }
    .footer-right > .footer-link + .footer-link { margin-left: 14px; }

    .social-icon, .footer-link {
      display: inline-flex;
      align-items: center;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.15s;
    }
    .social-icon:hover, .footer-link:hover { color: var(--accent); }

    @media (max-width: 480px) {
      .page { padding: 56px 20px 100px; }
      .feature-list li { flex-direction: column; gap: 4px; }
      .feat-label { min-width: unset; }
      footer { flex-direction: column; gap: 8px; }
      .diagram-row { flex-wrap: wrap; }
    }

    {{ extraStyle }}
  </style>
</head>
<body>
  <div class="page">

    <header>
      <a href="/" class="wordmark">The Data Room</a>
      <div class="tagline">thedataroom.app</div>
    </header>

    {{ content }}

    <footer>
      <span>&#169; <span id="year"></span> THE DATA ROOM</span>
      <span class="footer-right">
        <a href="https://x.com/thedataroomapp" aria-label="X" class="social-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a href="https://bsky.app/profile/thedataroom.app" aria-label="Bluesky" class="social-icon">
          <svg viewBox="0 0 600 530" fill="currentColor" width="18" height="16"><path d="M135.72 44.03C202.216 94.461 273.74 196.706 300 251.585c26.262-54.88 97.782-157.124 164.28-207.555C512.26 7.61 590 -20.54 590 68.165c0 17.712-10.155 148.79-16.111 170.07-20.703 73.984-96.144 92.854-163.25 81.433 117.275 19.964 147.146 86.092 82.697 152.218-122.39 125.59-175.879-31.523-189.59-71.762-2.515-7.378-3.69-10.832-3.71-7.894-.027-2.938-1.196.516-3.71 7.894-13.708 40.24-67.197 197.352-189.587 71.762-64.45-66.126-34.578-132.254 82.697-152.218-67.107 11.421-142.55-7.45-163.252-81.434C19.225 216.954 9.07 85.876 9.07 68.164c0-88.706 77.74-60.555 125.72-24.134h.93Z"/></svg>
        </a>
        <a href="/privacy" class="footer-link">PRIVACY</a>
        <a href="/terms" class="footer-link">TERMS</a>
      </span>
    </footer>

  </div>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
